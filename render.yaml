services:
  - type: web
    name: affiliateengine-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GMAIL_USER
        sync: false          # Set manually in Render dashboard
      - key: GMAIL_APP_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: EMAIL_FROM_NAME
        value: AffiliateEngine
      - key: OTP_EXPIRES_MINUTES
        value: 10
      - key: OTP_LENGTH
        value: 6
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
